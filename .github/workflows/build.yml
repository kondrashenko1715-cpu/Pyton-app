name: Build
on:
  workflow_dispatch:

jobs:
  build-android:
    name: Build for Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libssl-dev libsqlite3-dev libffi-dev libexpat1-dev
          pip install --user --upgrade buildozer cython virtualenv

      # Умный запуск сборки: скрипт сам найдет, в какой папке лежит buildozer.spec, зайдет туда и соберет APK
      - name: Build with Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          export APP_ANDROID_ACCEPT_SDK_LICENSE="1"
          
          # Находим папку с файлом buildozer.spec
          SPEC_DIR=$(dirname $(find . -name "buildozer.spec" | head -n 1))
          echo "Файлы игры найдены в папке: $SPEC_DIR"
          cd "$SPEC_DIR"
          
          # Запускаем чистую сборку без лишних флагов очистки
          yes | buildozer android debug

      # Умный поиск готового APK для отправки вам
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: "**/bin/*.apk"
