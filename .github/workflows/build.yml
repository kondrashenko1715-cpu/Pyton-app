name: Build
on:
  workflow_dispatch:

jobs:
  build-android:
    name: Build for Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Шаг 1: Установка системных утилит и фиксированных версий сборщиков
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libssl-dev libsqlite3-dev libffi-dev libexpat1-dev
          pip install --user --upgrade buildozer "cython<3.0.0" virtualenv

      # Шаг 2: Принятие лицензий через встроенный в GitHub Actions Android SDK
      - name: Accept Pre-installed Android SDK Licenses
        run: |
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          # Используем встроенный sdkmanager по его точному системному пути на GitHub
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      # Шаг 3: Быстрое кэширование сборщика
      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-ubuntu-${{ github.sha }}
          restore-keys: |
            buildozer-ubuntu-

      # Шаг 4: Очистка старых логов и компиляция APK файла
      - name: Build with Buildozer
        run: |
          cd test_app
          export PATH=$PATH:$HOME/.local/bin
          buildozer android clean
          yes | buildozer android debug

      # Шаг 5: Выгрузка готового APK для скачивания
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: test_app/bin/*.apk
