name: Build
on:
  workflow_dispatch:

jobs:
  build-android:
    name: Build for Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Установка системных зависимостей для сборки Android
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libssl-dev libsqlite3-dev libffi-dev libexpat1-dev

      # Кэширование Buildozer (сэкономит вам 5 минут при повторных сборках!)
      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-ubuntu-${{ github.sha }}
          restore-keys: |
            buildozer-ubuntu-

      # Официальный и стабильный экшен сборщика (сам ставит Cython и Buildozer)
      - name: Build APK with Buildozer
        uses: ArtemGovorov/buildozer-action@v1
        with:
          command: buildozer android debug
          # ВАЖНО: Если все файлы игры лежат внутри папки test_app, укажите тут: test_app
          # Если они лежат в самом корне репозитория, оставьте точку: .
          repository_root: test_app

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: package
          # Путь к готовому файлу (если root выше изменили на test_app, то и тут добавьте test_app/bin/*.apk)
          path: bin/*.apk
