name: Build
on:
  workflow_dispatch:

jobs:
  build-android:
    name: Build for Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libssl-dev libsqlite3-dev libffi-dev libexpat1-dev libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev
          pip install --user --upgrade buildozer cython virtualenv

      - name: Build with Buildozer
        run: |
          cd test_app
          export PATH=$PATH:$HOME/.local/bin
          export BUILDOZER_ALLOW_ORG_TEST_DOMAIN="1"
          export APP_ANDROID_ACCEPT_SDK_LICENSE="1"
          
          # УЛУЧШЕНИЕ: если сборка упадет, скрипт вырежет из логов только строки с ошибками Gradle/Java
          buildozer android debug || (echo "=== ТОЧНАЯ ПРИЧИНА ПАДЕНИЯ ===" && grep -i -C 5 "error" .buildozer/android/platform/build-arm64-v8a/dists/*/.buildozer_log 2>/dev/null || grep -i -C 5 "failed" .buildozer/android/platform/build-arm64-v8a/dists/*/.buildozer_log 2>/dev/null || tail -n 100 .buildozer/android/platform/build-arm64-v8a/dists/*/.buildozer_log 2>/dev/null)

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: "**/*.apk"
