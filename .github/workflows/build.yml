name: Build
on:
  workflow_dispatch:

jobs:
  build-android:
    name: Build for Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libssl-dev libsqlite3-dev libffi-dev libexpat1-dev
          pip install --user --upgrade "buildozer>=1.5.0" cython virtualenv

      # ЖЕЛЕЗОБЕТОННОЕ ИСПРАВЛЕНИЕ: Обманываем Buildozer, создавая пути для sdkmanager и aidl заранее!
      - name: Fix Android SDK Paths for Buildozer
        run: |
          # 1. Создаем структуру папок, которую ищет Buildozer
          mkdir -p /home/runner/.buildozer/android/platform/android-sdk/tools/bin/
          mkdir -p /home/runner/.buildozer/android/platform/android-sdk/build-tools/37.0.0/
          
          # 2. Делаем виртуальную ссылку на рабочий системный sdkmanager
          ln -s $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager /home/runner/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager || true
          
          # 3. Подкладываем утилиту aidl из системного SDK, чтобы не было ошибки "Aidl not found"
          cp $ANDROID_HOME/build-tools/*/aidl /home/runner/.buildozer/android/platform/android-sdk/build-tools/37.0.0/aidl || true

      # Запуск сборки приложения
      - name: Build with Buildozer
        run: |
          cd test_app
          export PATH=$PATH:$HOME/.local/bin
          export BUILDOZER_ALLOW_ORG_TEST_DOMAIN="1"
          export APP_ANDROID_ACCEPT_SDK_LICENSE="1"
          
          buildozer android debug

      # Скачивание готового APK-файла
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: test_app/*.apk
