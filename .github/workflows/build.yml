name: Build
on:
  workflow_dispatch:

jobs:
  build-android:
    name: Build for Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Официальный экшен для сборки, он сам внутри себя правильно ставит и Buildozer, и Cython, и принимает все лицензии SDK
      - name: Build APK with Buildozer
        uses: Artemonim/buildozer-action@v1
        with:
          command: buildozer android debug
          # Указываем папку, где лежит ваш buildozer.spec и main.py
          repository_root: test_app

      # Сохранение готового файла
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: test_app/bin/*.apk
