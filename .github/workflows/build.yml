name: Build
on:
  workflow_dispatch:

jobs:
  build-android:
    name: Build for Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Этот готовый инструмент сам установит Buildozer и правильно подпишет лицензии Google
      - name: Build APK with Buildozer
        uses: Artemonim/buildozer-action@v1
        with:
          command: buildozer android debug
          repository_root: test_app

      # Вытаскиваем готовый APK наружу
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: "./**/*.apk"
