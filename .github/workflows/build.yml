name: Build
on:
  workflow_dispatch:

jobs:
  build-android:
    name: Build for Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Ставим стабильную Java 17 для работы с NDK r25b
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Ставим проверенный Python 3.10
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libssl-dev libsqlite3-dev libffi-dev libexpat1-dev libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev
          pip install --user --upgrade "buildozer>=1.5.0" "cython<3.0.0" virtualenv

      - name: Build with Buildozer
        run: |
          cd test_app
          export PATH=$PATH:$HOME/.local/bin
          export BUILDOZER_ALLOW_ORG_TEST_DOMAIN="1"
          export APP_ANDROID_ACCEPT_SDK_LICENSE="1"
          buildozer android debug

      # Наш умный цикл поиска APK
      - name: Smart APK Search Loop
        run: |
          echo "Запуск интеллектуального поиска APK..."
          FOUND=false
          for i in {1..50}
          do
            echo "Попытка $i из 50: сканирование сервера на наличие .apk..."
            if sudo find / -name "*.apk" -exec cp {} ./game.apk \; 2>/dev/null && [ -f ./game.apk ]; then
              echo "УРА! Файл игры успешно найден и скопирован!"
              FOUND=true
              break
            fi
            echo "Файл пока не появился. Ждем 10 секунд..."
            sleep 10
          done
          if [ "$FOUND" = false ]; then
            echo "ОШИБКА: За 50 попыток Buildozer так и не создал APK файл."
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: game.apk
