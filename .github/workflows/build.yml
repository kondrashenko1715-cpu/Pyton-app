name: Build
on:
  workflow_dispatch:

jobs:
  build-android:
    name: Build for Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Обновляем JDK до 21 для совместимости с NDK r28c
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # Обновляем Python до 3.11
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libssl-dev libsqlite3-dev libffi-dev libexpat1-dev libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev
          pip install --user --upgrade buildozer cython virtualenv

      - name: Build with Buildozer
        run: |
          cd test_app
          export PATH=$PATH:$HOME/.local/bin
          export BUILDOZER_ALLOW_ORG_TEST_DOMAIN="1"
          export APP_ANDROID_ACCEPT_SDK_LICENSE="1"
          
          # Запуск сборки. Если упадет — команда после || распечатает скрытый лог ошибки!
          buildozer android debug || (echo "=== КРИТИЧЕСКИЙ ЛОГ ОШИБКИ ===" && tail -n 150 .buildozer/android/platform/build-arm64-v8a/dists/*/.buildozer_log 2>/dev/null || tail -n 150 ~/.buildozer/android/platform/build-arm64-v8a/dists/*/.buildozer_log 2>/dev/null || true)
      # Универсальный поиск заберет готовый APK из любой папки
      # ШАГ 1: Находим APK в любой скрытой папке сервера и принудительно копируем в корень под именем game.apk
      - name: Copy Ready APK
        run: find . -name "*.apk" -exec cp {} ./game.apk \;

      # ШАГ 2: Выгружаем этот файл из корня для скачивания
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: game.apk


