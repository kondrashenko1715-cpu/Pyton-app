name: Build
on:
  workflow_dispatch:

jobs:
  build-android:
    name: Build for Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Меняем Java на 11 версию для совместимости с NDK r25b
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      # Ставим стабильный Python 3.9 для надежной сборки p4a
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libssl-dev libsqlite3-dev libffi-dev libexpat1-dev libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev
          pip install --user --upgrade "buildozer>=1.5.0" "cython<3.0.0" virtualenv

      # v4-кэш для полной очистки старых конфликтов версий
      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-ubuntu-v4-${{ github.sha }}
          restore-keys: |
            buildozer-ubuntu-v4-

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          export APP_ANDROID_ACCEPT_SDK_LICENSE="1"
          
          SPEC_DIR=$(dirname $(find . -name "buildozer.spec" | head -n 1))
          echo "Проект найден в: $SPEC_DIR"
          cd "$SPEC_DIR"
          
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: "./**/*.apk"
