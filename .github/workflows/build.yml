name: Build
on:
  workflow_dispatch:

jobs:
  build-android:
    name: Build for Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Установка всех необходимых библиотек Linux для графики игры
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libssl-dev libsqlite3-dev libffi-dev libexpat1-dev libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev
          pip install --user --upgrade buildozer cython virtualenv

      # Кэширование: сохраняет скачанные рецепты, чтобы не начинать сборку с нуля
      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            test_app/.buildozer
          key: buildozer-android-v12-${{ github.sha }}
          restore-keys: |
            buildozer-android-v12-

      # Прямой и чистый запуск компилятора игры
      - name: Build with Buildozer
        run: |
          cd test_app
          export PATH=$PATH:$HOME/.local/bin
          export BUILDOZER_ALLOW_ORG_TEST_DOMAIN="1"
          export APP_ANDROID_ACCEPT_SDK_LICENSE="1"
          buildozer android debug

      # Извлечение готового APK файла из папки test_app наружу для скачивания
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: "test_app/**/*.apk"
