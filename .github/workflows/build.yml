name: Build
on:
  workflow_dispatch:

jobs:
  build-android:
    name: Build for Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Устанавливаем все системные библиотеки для Android SDK
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libssl-dev libsqlite3-dev libffi-dev libexpat1-dev
          pip install --user --upgrade buildozer cython virtualenv

      # Кэш сохранит скачанный Android SDK, чтобы сборка шла 1-2 минуты вместо 6
      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-ubuntu-${{ github.sha }}
          restore-keys: |
            buildozer-ubuntu-

      # Сама сборка. ВАЖНО: Команда 'cd test_app' оставлена, если ваши main.py и buildozer.spec лежат там
      - name: Build with Buildozer
        run: |
          cd test_app
          export PATH=$PATH:$HOME/.local/bin
          yes | buildozer android debug

      # Скачивание готового файла на ваш телефон/компьютер
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: test_app/bin/*.apk

