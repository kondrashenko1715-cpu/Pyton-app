name: Build
on:
  workflow_dispatch:

jobs:
  build-android:
    name: Build for Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Жестко ставим Python 3.10 для совместимости с Buildozer
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Установка системных утилит Linux и правильной ветки Cython
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libssl-dev libsqlite3-dev libffi-dev libexpat1-dev
          pip install --user --upgrade "buildozer>=1.5.0" "cython<3.0.0" virtualenv

      # Кэширование: сохраняет Android SDK, чтобы сборка не длилась вечно
      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-ubuntu-${{ github.sha }}
          restore-keys: |
            buildozer-ubuntu-

      # Запуск сборки с принудительным принятием лицензий Google
      - name: Build with Buildozer
        run: |
          cd test_app
          export PATH=$PATH:$HOME/.local/bin
          export APP_ANDROID_ACCEPT_SDK_LICENSE="1"
          yes | buildozer android debug

      # Сохранение готового APK-файла, который можно будет скачать
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: test_app/bin/*.apk
