name: Build
on:
  workflow_dispatch:

jobs:
  build-android:
    name: Build for Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Официальный экшен для сборки приложений на Kivy/Pygame
      - name: Build APK with Buildozer Action
        uses: kivy/buildozer-action@v1
        with:
          command: buildozer android debug
          repository_root: test_app

      # Универсальный сборщик заберет готовый файл
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: "**/*.apk"
