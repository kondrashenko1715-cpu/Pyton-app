name: Build
on:
  workflow_dispatch:

jobs:
  build-android:
    name: Build for Android
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libssl-dev libsqlite3-dev libffi-dev libexpat1-dev libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev
          pip install --user --upgrade "buildozer>=1.5.0" "cython<3.0.0" virtualenv

      # КРИТИЧЕСКИ ВАЖНЫЙ ФИКС: Удаляем скрытый кэш старой сломанной сборки
      - name: Clean hidden buildozer folders
        run: |
          rm -rf ~/.buildozer
          rm -rf test_app/.buildozer
          rm -rf test_app/bin

      - name: Build with Buildozer
        run: |
          cd test_app
          export PATH=$PATH:$HOME/.local/bin
          export BUILDOZER_ALLOW_ORG_TEST_DOMAIN="1"
          export APP_ANDROID_ACCEPT_SDK_LICENSE="1"
          
          # Очищаем внутренний кэш p4a и запускаем сборку начисто
          buildozer android clean
          buildozer android debug
